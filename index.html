<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">

        <h1>Rock-Paper-Scissors</h1>

        <p style="font-weight: bolder; color: rgb(151, 110, 55);">
            By Motanya Shadrack
        </p>

        <p class="carde">Reload Childhood Memories, or better still, you might be a kid as well😂 </p>

        <div class="scoreboard">
            <p>🧑 You: <span id="player-score">0</span></p>
            <p>💻 Computer: <span id="computer-score">0</span></p>
        </div>

        <div class="buttons">
            <button onclick="playGame('rock')">✊</button>
            <button onclick="playGame('paper')">✋</button>
            <button onclick="playGame('scissors')">✌️</button>
        </div>

        <h2 id="result">Make your move!</h2>

        <p id="choices"></p>

        <!-- Joke display -->
        <p id="joke" style="margin-top: 15px; font-style: italic; color: #444;"></p>

        <!--fun footer -->
        <p style="margin-top: 25px; font-size: 12px; color: gray;">
            Tip: The computer is always watching. And all that it's watching is your moves😊😊👀
        </p>

        <script src="script.js"></script>
    </div>
</body>

</html>
